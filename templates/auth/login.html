{% extends 'base.html' %}
{% block title %}Sign In - QuizMaster{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5">
        <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
            <div class="card-body p-5">
                <div class="text-center mb-5">
                    <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 80px; height: 80px;">
                        <i class="fas fa-user-lock fa-2x"></i>
                    </div>
                    <h2 class="fw-bold mb-1">Welcome Back</h2>
                    <p class="text-muted">Enter your credentials to access your dashboard</p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-uppercase ls-1 text-muted">Username</label>
                        <div class="input-group custom-input-group">
                            <span class="input-group-text bg-white border-end-0"><i class="fas fa-user text-muted"></i></span>
                            <input type="text" name="username" class="form-control border-start-0 shadow-none py-2" placeholder="Your username" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <div class="d-flex justify-content-between">
                            <label class="form-label small fw-bold text-uppercase ls-1 text-muted">Password</label>
                            <a href="#" class="small text-decoration-none fw-bold">Forgot?</a>
                        </div>
                        <div class="input-group custom-input-group">
                            <span class="input-group-text bg-white border-end-0"><i class="fas fa-lock text-muted"></i></span>
                            <input type="password" name="password" class="form-control border-start-0 shadow-none py-2" placeholder="Your password" required>
                        </div>
                    </div>

                    <div class="mb-4 form-check">
                        <input type="checkbox" class="form-check-input shadow-none" id="rememberMe">
                        <label class="form-check-label small text-muted" for="rememberMe">Remember me on this device</label>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-3 fw-bold rounded-3 shadow-sm">
                        Sign In <i class="fas fa-arrow-right ms-2"></i>
                    </button>
                </form>

                <div class="text-center mt-5 pt-3 border-top">
                    <p class="text-muted small mb-0">Don't have an account yet?</p>
                    <a href="{% url 'register' %}" class="fw-bold text-decoration-none">Create a free account</a>
                </div>
            </div>
        </div>

        <div class="text-center mt-4">
            <a href="{% url 'home' %}" class="text-muted text-decoration-none small">
                <i class="fas fa-chevron-left me-1"></i> Back to Home
            </a>
        </div>
    </div>
</div>

<style>
    .ls-1 { letter-spacing: 1px; }

    /* Normal state: Light visible border */
    .custom-input-group .input-group-text,
    .custom-input-group .form-control {
        border: 1px solid #ced4da;
        background-color: #fff;
        transition: all 0.2s ease-in-out;
    }

    /* Enhanced Focus: Stronger border & Glow */
    .custom-input-group:focus-within .input-group-text,
    .custom-input-group:focus-within .form-control {
        border-color: #0d6efd !important;
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
        background-color: #fff !important;
    }

    .custom-input-group:focus-within .input-group-text i {
        color: #0d6efd !important;
    }
</style>
{% endblock %}
