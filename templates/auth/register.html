{% extends 'base.html' %}
{% block title %}Create Account - QuizMaster{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-6 col-lg-5">
        <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-5">
                    <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 70px; height: 70px;">
                        <i class="fas fa-user-plus fa-2x"></i>
                    </div>
                    <h2 class="fw-bold mb-1">Create Account</h2>
                    <p class="text-muted">Join QuizMaster to start your journey</p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    <div class="row g-3">
                        <div class="col-sm-6">
                            <label class="form-label small fw-bold text-uppercase text-muted ls-1">First Name</label>
                            <input type="text" name="first_name" class="form-control bg-light border-0 py-2 shadow-none" placeholder="First" required>
                        </div>
                        <div class="col-sm-6">
                            <label class="form-label small fw-bold text-uppercase text-muted ls-1">Last Name</label>
                            <input type="text" name="last_name" class="form-control bg-light border-0 py-2 shadow-none" placeholder="Last" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold text-uppercase text-muted ls-1">Username</label>
                            <input type="text" name="username" class="form-control bg-light border-0 py-2 shadow-none" placeholder="username" required>
                            {% if form.username.errors %}<div class="text-danger x-small mt-1">{{ form.username.errors }}</div>{% endif %}
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold text-uppercase text-muted ls-1">Email Address</label>
                            <input type="email" name="email" class="form-control bg-light border-0 py-2 shadow-none" placeholder="email@example.com" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold text-uppercase text-muted ls-1">Register As</label>
                            <div class="d-flex gap-4 mt-1">
                                <div class="form-check custom-radio">
                                    <input class="form-check-input" type="radio" name="role" id="roleStudent" value="student" checked>
                                    <label class="form-check-label" for="roleStudent">Student</label>
                                </div>
                                <div class="form-check custom-radio">
                                    <input class="form-check-input" type="radio" name="role" id="roleTeacher" value="teacher">
                                    <label class="form-check-label" for="roleTeacher">Teacher</label>
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-6">
                            <label class="form-label small fw-bold text-uppercase text-muted ls-1">Password</label>
                            <input type="password" name="password1" class="form-control bg-light border-0 py-2 shadow-none" required>
                        </div>
                        <div class="col-sm-6">
                            <label class="form-label small fw-bold text-uppercase text-muted ls-1">Confirm</label>
                            <input type="password" name="password2" class="form-control bg-light border-0 py-2 shadow-none" required>
                        </div>
                        <div class="col-12 mt-4">
                            <button type="submit" class="btn btn-primary w-100 py-3 fw-bold rounded-3 shadow-sm">
                                Create Account <i class="fas fa-arrow-right ms-2"></i>
                            </button>
                        </div>
                    </div>
                </form>

                <div class="text-center mt-5 pt-3 border-top">
                    <p class="text-muted small mb-0">Already have an account? <a href="{% url 'login' %}" class="fw-bold text-decoration-none">Sign In</a></p>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .ls-1 { letter-spacing: 1px; }
    .x-small { font-size: 0.75rem; }
    .custom-radio .form-check-input:checked {
        background-color: var(--primary);
        border-color: var(--primary);
    }
</style>
{% endblock %}
